name: CI

on:
  pull_request:
    branches:
      - main
      - dev
      - "release/**"
  push:
    branches:
      - main
      - dev
      - "feature/**"
      - "release/**"
      - "hotfix/**"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-checks:
    name: Rust Checks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all --check

      - name: cargo check
        run: cargo check --workspace

      - name: cargo test
        run: cargo test --workspace

  compose-smoke:
    name: Compose Smoke [${{ matrix.coverage_label }}] (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: default-redis8
            coverage_label: GA
            compose_project_name: vansour-image-ci
            compose_variant: postgres
            smoke_flow: postgres
            cache_mode: redis8
          - name: default-no-cache
            coverage_label: Supplemental
            compose_project_name: vansour-image-ci-nocache
            compose_variant: postgres
            smoke_flow: health
            cache_mode: none
          - name: mysql-redis8
            coverage_label: Supplemental
            compose_project_name: vansour-image-ci-mysql
            compose_variant: mysql
            smoke_flow: auto
            cache_mode: redis8
          - name: mysql-dragonfly
            coverage_label: Supplemental
            compose_project_name: vansour-image-ci-mysql-dragonfly
            compose_variant: mysql
            smoke_flow: auto
            cache_mode: dragonfly
          - name: mariadb-redis8
            coverage_label: Supplemental
            compose_project_name: vansour-image-ci-mariadb
            compose_variant: mariadb
            smoke_flow: auto
            cache_mode: redis8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Compose smoke check
        env:
          COMPOSE_PROJECT_NAME: ${{ matrix.compose_project_name }}
          COMPOSE_VARIANT: ${{ matrix.compose_variant }}
          SMOKE_FLOW: ${{ matrix.smoke_flow }}
          CACHE_MODE: ${{ matrix.cache_mode }}
          DOCKER_BUILDKIT: "1"
          COMPOSE_DOCKER_CLI_BUILD: "1"
        run: ./scripts/compose-smoke.sh

  browser-click-regression:
    name: Browser Click Regression [Supplemental] (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: mysql-redis8
            compose_project_name: vansour-image-ci-browser-mysql
            compose_variant: mysql
            cache_mode: redis8
          - name: mysql-no-cache
            compose_project_name: vansour-image-ci-browser-mysql-nocache
            compose_variant: mysql
            cache_mode: none
          - name: mariadb-redis8
            compose_project_name: vansour-image-ci-browser-mariadb
            compose_variant: mariadb
            cache_mode: redis8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: scripts/browser-regression/package-lock.json

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Browser click regression
        env:
          COMPOSE_PROJECT_NAME: ${{ matrix.compose_project_name }}
          COMPOSE_VARIANT: ${{ matrix.compose_variant }}
          CACHE_MODE: ${{ matrix.cache_mode }}
          DOCKER_BUILDKIT: "1"
          COMPOSE_DOCKER_CLI_BUILD: "1"
        run: ./scripts/browser-click-regression.sh
