name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-checks:
    name: Rust Checks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all --check

      - name: cargo check
        run: cargo check --workspace

      - name: cargo test
        run: cargo test --workspace

  compose-smoke:
    name: Compose Smoke (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: default
            compose_project_name: vansour-image-ci
            compose_file_paths: ""
            smoke_flow: health
          - name: mysql
            compose_project_name: vansour-image-ci-mysql
            compose_file_paths: "compose.mysql.yml"
            smoke_flow: auto
          - name: mariadb
            compose_project_name: vansour-image-ci-mariadb
            compose_file_paths: "compose.mariadb.yml"
            smoke_flow: auto

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Compose smoke check
        env:
          COMPOSE_PROJECT_NAME: ${{ matrix.compose_project_name }}
          COMPOSE_FILE_PATHS: ${{ matrix.compose_file_paths }}
          SMOKE_FLOW: ${{ matrix.smoke_flow }}
          DOCKER_BUILDKIT: "1"
          COMPOSE_DOCKER_CLI_BUILD: "1"
        run: ./scripts/compose-smoke.sh

  browser-click-regression:
    name: Browser Click Regression (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: mysql
            compose_project_name: vansour-image-ci-browser-mysql
            compose_file_paths: "compose.mysql.yml"
          - name: mariadb
            compose_project_name: vansour-image-ci-browser-mariadb
            compose_file_paths: "compose.mariadb.yml"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: scripts/browser-regression/package-lock.json

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Browser click regression
        env:
          COMPOSE_PROJECT_NAME: ${{ matrix.compose_project_name }}
          COMPOSE_FILE_PATHS: ${{ matrix.compose_file_paths }}
          DOCKER_BUILDKIT: "1"
          COMPOSE_DOCKER_CLI_BUILD: "1"
        run: ./scripts/browser-click-regression.sh
