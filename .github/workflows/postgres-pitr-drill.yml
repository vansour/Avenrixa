name: Avenrixa PostgreSQL PITR Drill (GA)

on:
  workflow_dispatch:
  schedule:
    - cron: "30 3 * * 1"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  postgres-pitr-drill:
    name: Avenrixa PostgreSQL PITR Drill [GA] (${{ matrix.pitr_target_mode }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        pitr_target_mode:
          - name
          - time

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Run PostgreSQL PITR drill
        id: postgres_pitr_drill
        continue-on-error: true
        env:
          PITR_TARGET_MODE: ${{ matrix.pitr_target_mode }}
          COMPOSE_PROJECT_NAME: avenrixa-postgres-pitr-drill-ci-${{ matrix.pitr_target_mode }}
          COMPOSE_VARIANT: postgres
          ARTIFACT_DIR: ops-backups/postgres-pitr-drill-${{ matrix.pitr_target_mode }}
          DOCKER_BUILDKIT: "1"
          COMPOSE_DOCKER_CLI_BUILD: "1"
          PRESERVE_STACK_ON_FAILURE: "1"
        run: ./scripts/postgres-ops-pitr-drill.sh

      - name: Dump compose state after failure
        if: steps.postgres_pitr_drill.outcome != 'success'
        env:
          COMPOSE_PROJECT_NAME: avenrixa-postgres-pitr-drill-ci-${{ matrix.pitr_target_mode }}
          COMPOSE_VARIANT: postgres
        run: |
          ./scripts/compose-runtime.sh ps
          ./scripts/compose-runtime.sh logs --no-color --tail=300

      - name: Cleanup PostgreSQL PITR drill stack
        if: always()
        env:
          COMPOSE_PROJECT_NAME: avenrixa-postgres-pitr-drill-ci-${{ matrix.pitr_target_mode }}
          COMPOSE_VARIANT: postgres
          ARTIFACT_DIR: ops-backups/postgres-pitr-drill-${{ matrix.pitr_target_mode }}
        run: |
          ./scripts/compose-runtime.sh down -v --remove-orphans || true
          rm -rf data "${ARTIFACT_DIR}" || true

      - name: Mark workflow failed when drill failed
        if: steps.postgres_pitr_drill.outcome != 'success'
        run: exit 1
