name: Avenrixa Preview Dev Publish

on:
  push:
    branches:
      - dev
  workflow_dispatch:
    inputs:
      image_repository:
        description: Target GHCR image repository, for example ghcr.io/<owner>/avenrixa
        required: false
        default: ""

permissions:
  contents: read
  packages: write

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: preview-dev-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  preview-dev:
    name: Avenrixa Preview Dev Publish
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate preview source
        run: |
          if [[ "${GITHUB_REF_TYPE}" != "branch" || "${GITHUB_REF_NAME}" != "dev" ]]; then
            echo "Preview dev publish only runs from the dev branch." >&2
            exit 1
          fi

      - name: Resolve preview metadata
        id: preview-meta
        env:
          INPUT_IMAGE_REPOSITORY: ${{ github.event.inputs.image_repository || '' }}
        run: |
          workspace_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          repo_name="$(printf '%s' "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')"
          image_repository="${INPUT_IMAGE_REPOSITORY:-ghcr.io/${GITHUB_REPOSITORY_OWNER}/${repo_name}}"
          short_sha="$(git rev-parse --short=12 HEAD)"
          build_date="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "workspace_version=${workspace_version}" >> "${GITHUB_OUTPUT}"
          echo "image_repository=${image_repository}" >> "${GITHUB_OUTPUT}"
          echo "dev_image_ref=${image_repository}:dev" >> "${GITHUB_OUTPUT}"
          echo "sha_image_ref=${image_repository}:sha-${short_sha}" >> "${GITHUB_OUTPUT}"
          echo "build_revision=${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"
          echo "build_date=${build_date}" >> "${GITHUB_OUTPUT}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Show publish target
        run: |
          echo "Workspace version: ${{ steps.preview-meta.outputs.workspace_version }}"
          echo "Image repository: ${{ steps.preview-meta.outputs.image_repository }}"
          echo "Dev image ref: ${{ steps.preview-meta.outputs.dev_image_ref }}"
          echo "SHA image ref: ${{ steps.preview-meta.outputs.sha_image_ref }}"

      - name: Build preview image
        run: |
          docker build \
            --build-arg APP_VERSION="${{ steps.preview-meta.outputs.workspace_version }}" \
            --build-arg APP_REVISION="${{ steps.preview-meta.outputs.build_revision }}" \
            --build-arg BUILD_DATE="${{ steps.preview-meta.outputs.build_date }}" \
            -t "${{ steps.preview-meta.outputs.dev_image_ref }}" \
            .
          docker tag \
            "${{ steps.preview-meta.outputs.dev_image_ref }}" \
            "${{ steps.preview-meta.outputs.sha_image_ref }}"

      - name: Push preview image
        run: |
          docker push "${{ steps.preview-meta.outputs.dev_image_ref }}"
          docker push "${{ steps.preview-meta.outputs.sha_image_ref }}"
