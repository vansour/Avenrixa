name: Avenrixa Release 0.1 GA Ship

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      image_repository:
        description: Target GHCR image repository, for example ghcr.io/<owner>/avenrixa
        required: false
        default: ""

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: release-ga-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  skip-prerelease-tag:
    name: Skip Avenrixa GA Ship For Prerelease Tag
    if: github.event_name == 'push' && contains(github.ref_name, '-')
    runs-on: ubuntu-latest

    steps:
      - name: Explain skipped GA ship
        run: |
          echo "Skipping GA ship for prerelease tag: ${GITHUB_REF_NAME}"
          echo "Use the RC preflight workflow for release candidates."

  release-ga-ship:
    name: Avenrixa Release 0.1 GA Ship
    if: github.event_name != 'push' || !contains(github.ref_name, '-')
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Validate GA source
        run: |
          git fetch origin "+refs/heads/*:refs/remotes/origin/*" --tags --prune

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            release_version="${GITHUB_REF_NAME#v}"
            if [[ "${release_version}" == *-* ]]; then
              echo "GA workflow does not accept prerelease tags." >&2
              exit 1
            fi
            if ! git branch -r --contains "${GITHUB_SHA}" | sed 's/^ *//' | grep -Fx "origin/main" >/dev/null; then
              echo "Stable tag ${GITHUB_REF_NAME} must point to a commit contained in origin/main." >&2
              exit 1
            fi
          else
            if [[ "${GITHUB_REF_NAME}" != "main" ]]; then
              echo "Manual GA ship must run from main." >&2
              exit 1
            fi

            workspace_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
            if [[ "${workspace_version}" == *-* ]]; then
              echo "Main branch workspace version must be a stable version before GA ship." >&2
              exit 1
            fi
          fi

      - name: Resolve release metadata
        id: release-meta
        env:
          INPUT_IMAGE_REPOSITORY: ${{ github.event.inputs.image_repository || '' }}
        run: |
          workspace_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          release_version="${workspace_version}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            release_version="${GITHUB_REF_NAME#v}"
          fi
          if [[ "${release_version}" != "${workspace_version}" ]]; then
            echo "Tag version (${release_version}) must match workspace version (${workspace_version})" >&2
            exit 1
          fi
          repo_name="$(printf '%s' "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')"
          image_repository="${INPUT_IMAGE_REPOSITORY:-ghcr.io/${GITHUB_REPOSITORY_OWNER}/${repo_name}}"
          {
            echo "release_version=${release_version}"
            echo "image_repository=${image_repository}"
            echo "release_image_ref=${image_repository}:${release_version}"
            echo "latest_image_ref=${image_repository}:latest"
          } >> "${GITHUB_OUTPUT}"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2.9.1

      - name: Log in to GHCR
        uses: docker/login-action@v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Show publish target
        run: |
          echo "Release version: ${{ steps.release-meta.outputs.release_version }}"
          echo "Image repository: ${{ steps.release-meta.outputs.image_repository }}"
          echo "Image ref: ${{ steps.release-meta.outputs.release_image_ref }}"
          echo "Latest ref: ${{ steps.release-meta.outputs.latest_image_ref }}"

      - name: Run 0.1 GA ship
        env:
          RELEASE_VERSION: ${{ steps.release-meta.outputs.release_version }}
          RELEASE_BUILD_REVISION: ${{ github.sha }}
          RELEASE_IMAGE_REF: ${{ steps.release-meta.outputs.release_image_ref }}
          RELEASE_IMAGE_PUSH: "1"
          RELEASE_IMAGE_ADDITIONAL_TAGS: ${{ steps.release-meta.outputs.latest_image_ref }}
          DOCKER_BUILDKIT: "1"
          COMPOSE_DOCKER_CLI_BUILD: "1"
        run: ./scripts/release-ga-ship.sh

      - name: Upload GA release assets
        uses: actions/upload-artifact@v7.0.0
        with:
          name: avenrixa-release-assets-${{ steps.release-meta.outputs.release_version }}
          path: dist/release/
          if-no-files-found: error
          retention-days: 14

      - name: Upsert GA GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${{ steps.release-meta.outputs.release_version }}"
          title="Avenrixa ${{ steps.release-meta.outputs.release_version }}"
          notes_file="dist/release/${{ steps.release-meta.outputs.release_version }}/release-notes.md"

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release edit "${tag}" \
              --title "${title}" \
              --notes-file "${notes_file}" \
              --latest \
              --verify-tag
          else
            gh release create "${tag}" \
              --title "${title}" \
              --notes-file "${notes_file}" \
              --latest \
              --verify-tag
          fi

      - name: Upload GA assets to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${{ steps.release-meta.outputs.release_version }}"
          asset_dir="dist/release/${{ steps.release-meta.outputs.release_version }}"

          shopt -s nullglob
          assets=("${asset_dir}"/*)
          if [[ ${#assets[@]} -eq 0 ]]; then
            echo "No GA release assets found in ${asset_dir}" >&2
            exit 1
          fi

          gh release upload "${tag}" "${assets[@]}" --clobber
