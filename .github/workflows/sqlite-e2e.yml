name: SQLite E2E

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  sqlite-e2e:
    name: SQLite E2E Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Run SQLite E2E smoke
        id: sqlite_e2e
        continue-on-error: true
        env:
          APP_HOST_PORT: "18080"
          MAILPIT_HTTP_PORT: "18025"
          COMPOSE_PROJECT_NAME: vansour-image-sqlite-e2e-ci
          DOCKER_BUILDKIT: "1"
          COMPOSE_DOCKER_CLI_BUILD: "1"
          PRESERVE_STACK_ON_FAILURE: "1"
        run: ./scripts/sqlite-e2e-smoke.sh

      - name: Dump compose state after failure
        if: steps.sqlite_e2e.outcome != 'success'
        run: |
          docker compose -p vansour-image-sqlite-e2e-ci -f compose.sqlite.yml -f compose.sqlite.mailpit.yml ps
          docker compose -p vansour-image-sqlite-e2e-ci -f compose.sqlite.yml -f compose.sqlite.mailpit.yml logs --no-color --tail=300

      - name: Cleanup SQLite E2E stack
        if: always()
        run: |
          docker compose -p vansour-image-sqlite-e2e-ci -f compose.sqlite.yml -f compose.sqlite.mailpit.yml down -v --remove-orphans || true

      - name: Mark workflow failed when smoke failed
        if: steps.sqlite_e2e.outcome != 'success'
        run: exit 1
