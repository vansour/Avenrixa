name: SQLite E2E (Supplemental)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  sqlite-e2e:
    name: SQLite E2E Smoke [Supplemental] (${{ matrix.cache_mode }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        cache_mode:
          - redis8
          - none

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Run SQLite E2E smoke
        id: sqlite_e2e
        continue-on-error: true
        env:
          COMPOSE_PROJECT_NAME: vansour-image-sqlite-e2e-ci-${{ matrix.cache_mode }}
          COMPOSE_VARIANT: sqlite
          COMPOSE_ENABLE_MAILPIT: "1"
          CACHE_MODE: ${{ matrix.cache_mode }}
          DOCKER_BUILDKIT: "1"
          COMPOSE_DOCKER_CLI_BUILD: "1"
          PRESERVE_STACK_ON_FAILURE: "1"
        run: ./scripts/sqlite-e2e-smoke.sh

      - name: Dump compose state after failure
        if: steps.sqlite_e2e.outcome != 'success'
        env:
          COMPOSE_PROJECT_NAME: vansour-image-sqlite-e2e-ci-${{ matrix.cache_mode }}
          COMPOSE_VARIANT: sqlite
          COMPOSE_ENABLE_MAILPIT: "1"
          CACHE_MODE: ${{ matrix.cache_mode }}
        run: |
          ./scripts/compose-runtime.sh ps
          ./scripts/compose-runtime.sh logs --no-color --tail=300

      - name: Cleanup SQLite E2E stack
        if: always()
        env:
          COMPOSE_PROJECT_NAME: vansour-image-sqlite-e2e-ci-${{ matrix.cache_mode }}
          COMPOSE_VARIANT: sqlite
          COMPOSE_ENABLE_MAILPIT: "1"
          CACHE_MODE: ${{ matrix.cache_mode }}
        run: |
          ./scripts/compose-runtime.sh down -v --remove-orphans || true

      - name: Mark workflow failed when smoke failed
        if: steps.sqlite_e2e.outcome != 'success'
        run: exit 1
