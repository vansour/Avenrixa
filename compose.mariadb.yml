# 开发 / 联调 / 烟测入口。
# 这里保留的是固定演示口令，不要直接作为长期运维配置使用。

volumes:
  mariadb_data:

services:
  app:
    container_name: vansour-image-mariadb-app
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/vansour/vansour-image:latest
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      dragonfly:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://dragonfly:6379
      - JWT_SECRET=your-secret-key-change-in-production
      - AUTH_COOKIE_SECURE=false
      - AUTH_COOKIE_SAME_SITE=Strict
    volumes:
      - "./data-mariadb:/data"
    restart: unless-stopped
    healthcheck:
      test: curl -f http://localhost:8080/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mysql:
    container_name: vansour-image-mariadb
    image: mariadb:12
    environment:
      - MARIADB_DATABASE=image
      - MARIADB_USER=user
      - MARIADB_PASSWORD=pass
      - MARIADB_ROOT_PASSWORD=rootpass
      - MYSQL_DATABASE=image
      - MYSQL_USER=user
      - MYSQL_PASSWORD=pass
      - MYSQL_ROOT_PASSWORD=rootpass
    volumes:
      - "mariadb_data:/var/lib/mysql"
    healthcheck:
      test:
        - CMD-SHELL
        - mariadb-admin ping -h 127.0.0.1 -uuser -ppass || mysqladmin ping -h 127.0.0.1 -uuser -ppass
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  dragonfly:
    container_name: vansour-image-mariadb-dragonfly
    image: ghcr.io/dragonflydb/dragonfly:latest
    command: --dir=/data
    healthcheck:
      test: redis-cli ping
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
