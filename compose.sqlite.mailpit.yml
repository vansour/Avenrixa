services:
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "${MAILPIT_HTTP_PORT:-18025}:8025"
      - "${MAILPIT_SMTP_PORT:-11025}:1025"
    healthcheck:
      test: wget --quiet --output-document=- http://localhost:8025/api/v1/info || exit 1
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
