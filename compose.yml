services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/vansour/vansour-image:latest
    ports:
      - "${APP_HOST_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      dragonfly:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://dragonfly:6379
      - JWT_SECRET=your-secret-key-change-in-production
      - AUTH_COOKIE_SECURE=false
      - AUTH_COOKIE_SAME_SITE=Strict
    volumes:
      - "${DATA_DIR:-./data}:/data"
    restart: unless-stopped
    healthcheck:
      test: curl -f http://localhost:8080/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  postgres:
    image: postgres:trixie
    depends_on:
      postgres-init:
        condition: service_completed_successfully
    environment:
      - POSTGRES_DB=image
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
    volumes:
      - "${POSTGRES_DATA_DIR:-./pg_data}:/var/lib/postgresql"
    healthcheck:
      test: pg_isready -U user -d image
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  postgres-init:
    image: alpine:3.22
    user: "0:0"
    volumes:
      - "${POSTGRES_DATA_DIR:-./pg_data}:/pg_data"
    command:
      - sh
      - -c
      - chown -R 999:999 /pg_data && chmod 700 /pg_data
  dragonfly:
    image: ghcr.io/dragonflydb/dragonfly:latest
    command: --dir=/data
    healthcheck:
      test: redis-cli ping
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
