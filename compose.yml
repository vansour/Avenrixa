# 统一手工部署入口。
#
# 默认启用：PostgreSQL + Dragonfly + 本地存储。
# 如果要改成无外部缓存模式：
# 1. 删除 `services.app.depends_on.cache`
# 2. 把 `CACHE_URL` 改为空字符串

volumes:
  postgres_data:

services:
  app:
    container_name: avenrixa-app
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-0.1.3-dev.0}
        APP_REVISION: ${APP_REVISION:-dev}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    image: ${APP_IMAGE_REF:-ghcr.io/vansour/avenrixa:latest}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      cache:
        condition: service_healthy
    environment:
      DATABASE_KIND: postgresql
      DATABASE_URL: postgresql://user:pass@postgres:5432/image
      CACHE_URL: dragonfly://cache:6379
      JWT_SECRET: your-secret-key-change-in-production
      AUTH_COOKIE_SECURE: "false"
      AUTH_COOKIE_SAME_SITE: Strict
    volumes:
      - "./data:/data"
    restart: unless-stopped
    healthcheck:
      test: curl -f http://localhost:8080/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    container_name: avenrixa-postgres
    image: ${POSTGRES_IMAGE:-postgres:18}
    environment:
      POSTGRES_DB: image
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    volumes:
      - "postgres_data:/var/lib/postgresql"
    healthcheck:
      test: pg_isready -U user -d image
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  cache:
    container_name: avenrixa-cache
    image: ${DRAGONFLY_IMAGE:-docker.dragonflydb.io/dragonflydb/dragonfly}
    healthcheck:
      test:
        - CMD-SHELL
        - nc -z 127.0.0.1 6379
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
