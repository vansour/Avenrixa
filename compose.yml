services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vansour-image
    image: ghcr.io/vansour/vansour-image:latest
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      dragonfly:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://user:pass@postgres:5432/image
      - REDIS_URL=redis://dragonfly:6379
      - JWT_SECRET=your-secret-key-change-in-production
      - AUTH_COOKIE_SECURE=false
    volumes:
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: curl -f http://localhost:8080/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  postgres:
    image: postgres:trixie
    container_name: vansour-image-postgres
    environment:
      - POSTGRES_DB=image
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
    volumes:
      - ./pg_data:/var/lib/postgresql
    healthcheck:
      test: pg_isready -U user -d image
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  dragonfly:
    image: ghcr.io/dragonflydb/dragonfly:latest
    container_name: vansour-image-dragonfly
    command: --dir=/data
    healthcheck:
      test: redis-cli ping
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
