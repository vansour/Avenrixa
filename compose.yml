services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vansour-image
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      dragonfly:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://user:pass@postgres:5432/image
      - REDIS_URL=redis://dragonfly:6379
      - JWT_SECRET=your-secret-key-change-in-production
    volumes:
      - ./image_data:/data/images
      - ./thumbnail_data:/data/thumbnails
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: ghcr.io/vansour/postgres:trixie
    container_name: vansour-image-postgres
    environment:
      - POSTGRES_DB=image
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
    volumes:
      - ./postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d image"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  dragonfly:
    image: ghcr.io/dragonflydb/dragonfly:latest
    container_name: vansour-image-dragonfly
    volumes:
      - ./dragonfly_data:/data
    command: --dir=/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
