# 统一手工部署入口。
#
# 默认启用：PostgreSQL + Redis 8。
# 如果你要改成 SQLite / MySQL / MariaDB / Dragonfly / 无外部缓存，直接在这个文件里替换或解注释对应片段即可。
#
# 建议切换顺序：
# 1. 先改 `services.app` 里的 `depends_on` / `environment` / `volumes`
# 2. 再把数据库服务从 `postgres` 换成你需要的 `mysql`
# 3. 最后决定 `cache` 是 Redis 8、Dragonfly，还是彻底去掉
#
# 生产环境如果启用 MySQL / MariaDB 运维口令示例，记得替换：
# - JWT_SECRET
# - 数据库应用用户密码
# - 数据库 root 密码

volumes:
  postgres_data:
  mysql_data:
  mariadb_data:

services:
  app:
    container_name: vansour-image-app
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-0.1.2-rc.1}
        APP_REVISION: ${APP_REVISION:-dev}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    image: ${APP_IMAGE_REF:-ghcr.io/vansour/avenrixa:latest}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      cache:
        condition: service_healthy
    environment:
      DATABASE_KIND: postgresql
      DATABASE_URL: postgresql://user:pass@postgres:5432/image
      REDIS_URL: redis://cache:6379
      JWT_SECRET: your-secret-key-change-in-production
      AUTH_COOKIE_SECURE: "false"
      AUTH_COOKIE_SAME_SITE: Strict
    volumes:
      - "./data:/data"
    restart: unless-stopped
    healthcheck:
      test: curl -f http://localhost:8080/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # SQLite：
    # 1. 删掉上面的 `depends_on.postgres`
    # 2. 保留 `depends_on.cache`
    # 3. 把 `DATABASE_KIND` / `DATABASE_URL` / `volumes` 改成下面这样
    #
    # depends_on:
    #   cache:
    #     condition: service_healthy
    # environment:
    #   DATABASE_KIND: sqlite
    #   DATABASE_URL: sqlite:///data/sqlite/app.db
    #   REDIS_URL: redis://cache:6379
    #   JWT_SECRET: your-secret-key-change-in-production
    #   AUTH_COOKIE_SECURE: "false"
    #   AUTH_COOKIE_SAME_SITE: Strict
    # volumes:
    #   - "./data-sqlite:/data"

    # MySQL 8.4 开发 / 联调 / 烟测：
    # 1. 把上面的 `depends_on.postgres` 改成 `depends_on.mysql`
    # 2. 把环境变量和卷改成下面这样
    #
    # depends_on:
    #   mysql:
    #     condition: service_healthy
    #   cache:
    #     condition: service_healthy
    # environment:
    #   DATABASE_KIND: mysql
    #   DATABASE_URL: mysql://user:pass@mysql:3306/image
    #   REDIS_URL: redis://cache:6379
    #   JWT_SECRET: your-secret-key-change-in-production
    #   AUTH_COOKIE_SECURE: "false"
    #   AUTH_COOKIE_SAME_SITE: Strict
    # volumes:
    #   - "./data-mysql:/data"

    # MariaDB 12 开发 / 联调 / 烟测：
    #
    # depends_on:
    #   mysql:
    #     condition: service_healthy
    #   cache:
    #     condition: service_healthy
    # environment:
    #   DATABASE_KIND: mysql
    #   DATABASE_URL: mariadb://user:pass@mysql:3306/image
    #   REDIS_URL: redis://cache:6379
    #   JWT_SECRET: your-secret-key-change-in-production
    #   AUTH_COOKIE_SECURE: "false"
    #   AUTH_COOKIE_SAME_SITE: Strict
    # volumes:
    #   - "./data-mariadb:/data"

    # MySQL 8.4 长期运维：
    #
    # depends_on:
    #   mysql:
    #     condition: service_healthy
    #   cache:
    #     condition: service_healthy
    # environment:
    #   DATABASE_KIND: mysql
    #   DATABASE_URL: mysql://vansour_image:replace-with-strong-app-password@mysql:3306/image
    #   REDIS_URL: redis://cache:6379
    #   JWT_SECRET: replace-with-a-random-secret-at-least-32-characters
    #   AUTH_COOKIE_SECURE: "true"
    #   AUTH_COOKIE_SAME_SITE: Strict
    # volumes:
    #   - "./data-mysql:/data"

    # MariaDB 12 长期运维：
    #
    # depends_on:
    #   mysql:
    #     condition: service_healthy
    #   cache:
    #     condition: service_healthy
    # environment:
    #   DATABASE_KIND: mysql
    #   DATABASE_URL: mariadb://vansour_image:replace-with-strong-app-password@mysql:3306/image
    #   REDIS_URL: redis://cache:6379
    #   JWT_SECRET: replace-with-a-random-secret-at-least-32-characters
    #   AUTH_COOKIE_SECURE: "true"
    #   AUTH_COOKIE_SAME_SITE: Strict
    # volumes:
    #   - "./data-mariadb:/data"

    # 无外部缓存：
    # 1. 删除 `depends_on.cache`
    # 2. 把 `REDIS_URL` 改为空字符串
    #
    # environment:
    #   DATABASE_KIND: postgresql
    #   DATABASE_URL: postgresql://user:pass@postgres:5432/image
    #   REDIS_URL: ""
    #   JWT_SECRET: your-secret-key-change-in-production
    #   AUTH_COOKIE_SECURE: "false"
    #   AUTH_COOKIE_SAME_SITE: Strict

  postgres:
    container_name: vansour-image-postgres
    image: ${POSTGRES_IMAGE:-postgres:18}
    environment:
      POSTGRES_DB: image
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    volumes:
      - "postgres_data:/var/lib/postgresql"
    healthcheck:
      test: pg_isready -U user -d image
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # SQLite：
  # 不需要额外数据库服务，直接把上面的 `postgres` 整块删掉或注释掉。

  # MySQL 8.4 开发 / 联调 / 烟测：
  #
  # mysql:
  #   container_name: vansour-image-mysql
  #   image: mysql:8.4
  #   environment:
  #     MYSQL_DATABASE: image
  #     MYSQL_USER: user
  #     MYSQL_PASSWORD: pass
  #     MYSQL_ROOT_PASSWORD: rootpass
  #   volumes:
  #     - "mysql_data:/var/lib/mysql"
  #   healthcheck:
  #     test: mysqladmin ping -h 127.0.0.1 -uuser -ppass
  #     interval: 5s
  #     timeout: 5s
  #     retries: 10
  #   restart: unless-stopped

  # MySQL 8.4 长期运维：
  #
  # mysql:
  #   container_name: vansour-image-mysql
  #   image: mysql:8.4
  #   environment:
  #     MYSQL_DATABASE: image
  #     MYSQL_USER: vansour_image
  #     MYSQL_PASSWORD: replace-with-strong-app-password
  #     MYSQL_ROOT_PASSWORD: replace-with-strong-root-password
  #   volumes:
  #     - "mysql_data:/var/lib/mysql"
  #   healthcheck:
  #     test: mysqladmin ping -h 127.0.0.1 -uvansour_image -preplace-with-strong-app-password
  #     interval: 5s
  #     timeout: 5s
  #     retries: 10
  #   restart: unless-stopped

  # MariaDB 12 开发 / 联调 / 烟测：
  #
  # mysql:
  #   container_name: vansour-image-mariadb
  #   image: mariadb:12
  #   environment:
  #     MARIADB_DATABASE: image
  #     MARIADB_USER: user
  #     MARIADB_PASSWORD: pass
  #     MARIADB_ROOT_PASSWORD: rootpass
  #     MYSQL_DATABASE: image
  #     MYSQL_USER: user
  #     MYSQL_PASSWORD: pass
  #     MYSQL_ROOT_PASSWORD: rootpass
  #   volumes:
  #     - "mariadb_data:/var/lib/mysql"
  #   healthcheck:
  #     test:
  #       - CMD-SHELL
  #       - mariadb-admin ping -h 127.0.0.1 -uuser -ppass || mysqladmin ping -h 127.0.0.1 -uuser -ppass
  #     interval: 5s
  #     timeout: 5s
  #     retries: 10
  #   restart: unless-stopped

  # MariaDB 12 长期运维：
  #
  # mysql:
  #   container_name: vansour-image-mariadb
  #   image: mariadb:12
  #   environment:
  #     MARIADB_DATABASE: image
  #     MARIADB_USER: vansour_image
  #     MARIADB_PASSWORD: replace-with-strong-app-password
  #     MARIADB_ROOT_PASSWORD: replace-with-strong-root-password
  #     MYSQL_DATABASE: image
  #     MYSQL_USER: vansour_image
  #     MYSQL_PASSWORD: replace-with-strong-app-password
  #     MYSQL_ROOT_PASSWORD: replace-with-strong-root-password
  #   volumes:
  #     - "mariadb_data:/var/lib/mysql"
  #   healthcheck:
  #     test:
  #       - CMD-SHELL
  #       - mariadb-admin ping -h 127.0.0.1 -uvansour_image -preplace-with-strong-app-password || mysqladmin ping -h 127.0.0.1 -uvansour_image -preplace-with-strong-app-password
  #     interval: 5s
  #     timeout: 5s
  #     retries: 10
  #   restart: unless-stopped

  cache:
    container_name: vansour-image-cache
    image: redis:8
    healthcheck:
      test: redis-cli ping
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Dragonfly：
  # 把上面的 `cache` 服务改成下面这样：
  #
  # cache:
  #   container_name: vansour-image-cache
  #   image: ghcr.io/dragonflydb/dragonfly:latest
  #   command: --dir=/data
  #   healthcheck:
  #     test: redis-cli ping
  #     interval: 5s
  #     timeout: 5s
  #     retries: 5
  #   restart: unless-stopped

  # 无外部缓存：
  # 直接把上面的 `cache` 服务整块删掉或注释掉。
